{% extends 'base.html' %}

{% block title %}Input Laporan - BPS Monitoring{% endblock %}
{% block page_title %}Input Laporan Harian{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white py-3">
                <h6 class="mb-0 fw-bold">
                    <i class="fas fa-plus-circle me-2"></i>Form Input Laporan Harian
                </h6>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tanggal Laporan</label>
                        <input type="date" name="tanggal_laporan" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Wilayah Tugas</label>
                        <select name="wilayah" class="form-select" required>
                            <option value="">-- Pilih Wilayah --</option>
                            {% for w in wilayah_list %}
                            <option value="{{ w.id }}">{{ w.nama_kecamatan }} - {{ w.nama_kelurahan }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Jumlah Usaha Selesai</label>
                            <input type="number" name="jumlah_selesai" class="form-control" min="0" value="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Jumlah Usaha Bermasalah</label>
                            <input type="number" name="jumlah_bermasalah" class="form-control" min="0" value="0" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Catatan</label>
                        <textarea name="catatan" class="form-control" rows="4" placeholder="Tuliskan catatan laporan hari ini..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fas fa-save me-2"></i>Simpan Laporan
                        </button>
                        <a href="{% url 'dashboard_petugas' %}" class="btn btn-outline-secondary px-4">
                            <i class="fas fa-arrow-left me-2"></i>Kembali
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
