<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BPS Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%); min-height: 100vh;">
    <div class="min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card p-4" style="width: 400px; border-radius: 12px;">
            <div class="text-center mb-4">
                <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:70px;height:70px; background:#1a3c5e !important;">
                    <i class="fas fa-chart-bar fa-2x text-white"></i>
                </div>
                <h4 class="fw-bold text-dark">BPS Monitoring</h4>
                <p class="text-muted small mb-0">Sistem Monitoring Sensus Ekonomi 2026</p>
                <p class="text-muted small">Kabupaten Tulungagung</p>
            </div>
            {% if form.errors %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle me-2"></i>
                Username atau password salah. Silakan coba lagi.
            </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Masukkan username" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Masukkan password" required>
                    </div>
                </div>
                <button type="submit" class="btn w-100 py-2 fw-semibold text-white" style="background:#1a3c5e;">
                    <i class="fas fa-sign-in-alt me-2"></i>Masuk
                </button>
            </form>
            <div class="text-center mt-3">
                <small class="text-muted">Badan Pusat Statistik Kabupaten Tulungagung</small>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
